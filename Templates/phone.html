<!DOCTYPE html>
<html>

<head>

    <title>Phone Validator</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav>

    <h2>🛡️ SentinelOS</h2>

    <a href="/">Home</a>
    <a href="/scanner">File Scanner</a>
    <a href="/phone">Phone Validator</a>

</nav>

<div class="container">

<h1>📞 Phone Validator</h1>

<form action="/validate-phone" method="POST">

<input
type="text"
name="phone"
placeholder="Enter 10-digit Phone Number"
required>

<br><br>

<button type="submit">

Validate

</button>

</form>

{% if result %}

<h2>{{ result }}</h2>

{% endif %}

</div>

</body>

</html>
