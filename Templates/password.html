<!DOCTYPE html>
<html>

<head>
    <title>Password Checker</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav>
    <h2>🛡️ SentinelOS</h2>

    <a href="/">Home</a>
    <a href="/scanner">File Scanner</a>
    <a href="/phone">Phone Validator</a>
    <a href="/password">Password Checker</a>
</nav>

<div class="container">

    <h1>🔑 Password Checker</h1>

    <form action="/check-password" method="POST">

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required>

        <br><br>

        <button type="submit">Check Password</button>

    </form>

    {% if result %}
        <h2>{{ result }}</h2>
    {% endif %}

</div>

</body>
</html>
